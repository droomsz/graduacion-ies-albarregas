<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | Graduación IES Albarregas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-main { max-width: 1000px; width: 95%; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; color: white; min-width: 800px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { background-color: #d4af37; color: #121212; font-weight: bold; position: sticky; top: 0; }
        tr:hover { background-color: #2a2a2a; }
        .toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; vertical-align: middle; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #f44336; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4caf50; }
        input:focus + .slider { box-shadow: 0 0 1px #4caf50; }
        input:checked + .slider:before { transform: translateX(20px); }
        .login-box { text-align: center; margin-top: 50px; padding: 40px; background-color: #2a2a2a; border-radius: 10px; border-top: 5px solid #d4af37; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        
        /* Estilos del nuevo panel para añadir alumnos */
        .add-student-box {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #4caf50;
        }
        .add-student-inputs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .add-student-inputs input { padding: 10px; flex: 1; min-width: 150px; }
    </style>
</head>
<body>
    <div class="container admin-main">
        <header>
            <h1>🔒 Administración IES Albarregas</h1>
            <p>Panel exclusivo de organización. Gestión de Pagos.</p>
        </header>

        <main id="adminContent">
            <div id="loginBox" class="login-box">
                <h3 style="margin-bottom: 20px; color: #d4af37;">Acceso Restringido</h3>
                <input type="password" id="adminPassword" placeholder="Introduce la contraseña secreta..." style="margin-bottom: 15px; width: 100%; max-width: 300px;">
                <br>
                <button onclick="intentarLogin()">Acceder al Panel</button>
                <p id="loginError" style="color: #f44336; margin-top: 15px; display: none;">Contraseña incorrecta.</p>
            </div>

            <div id="panelBox" style="display: none;">
                <div class="header-admin">
                    <button onclick="cerrarSesion()" style="background-color: #f44336; padding: 10px 20px; font-size: 0.9rem;">Cerrar Sesión</button>
                    <button onclick="cargarTablaCompleta()" style="background-color: #333; color: #d4af37; border: 1px solid #d4af37; padding: 10px 20px; font-size: 0.9rem;">🔄 Recargar Datos</button>
                </div>
                
                <div class="add-student-box">
                    <h3 style="color: #4caf50; font-size: 1.2rem;">➕ Añadir Nuevo Alumno a la Lista</h3>
                    <div class="add-student-inputs">
                        <input type="text" id="nuevoNombre" placeholder="Nombre completo (Obligatorio)">
                        <input type="text" id="nuevoCurso" placeholder="Curso (Ej: 2 D)" style="max-width: 120px;">
                        <input type="text" id="nuevoInv1" placeholder="Nombre Invitado 1 (Opcional)">
                        <button id="btnAnadir" onclick="crearAlumno()" style="background-color: #4caf50; padding: 10px 20px;">Guardar</button>
                    </div>
                </div>
                
                <div id="tablaContainer" class="table-wrapper">
                    <p style="color: #a0a0a0; text-align: center; padding: 20px;">Descargando datos del Excel...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
